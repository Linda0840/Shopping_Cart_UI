<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Menu</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="{{ url_for('static', filename='index.js') }}"></script>
</head>
<body>
    <div id="buyerDashboard" style="display:none;">
        <h1>Buyer Menu</h1>

        <!-- Search input field and button -->
        <h2>Search Products</h2>
        <input type="text" id="searchInput" placeholder="Enter product name">
        <button onclick="displaySearchProductWidgets()">Search Product</button>
        <div id="searchOutput"></div>

        <!-- Display cart items and total price -->
        <h2>View Cart</h2>
        <button onclick="displayCart()">View Cart</button>
        <div id="cart-container"></div>
        <div id="total-container"></div>

        <h2>My Orders</h2>
        <button onclick="displayOrders()">My Order</button>
        <div id="orders-container"></div>

        <h2>Cancel Orders</h2>
        <button onclick="cancelOrder()">Cancel Order</button>
        <input type="text" id="cancelOrderInput" placeholder="Enter order id">
        <div id="cancel-order-container"></div>

    </div>
</body>
</html>
